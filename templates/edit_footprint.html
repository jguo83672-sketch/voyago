{% extends "base.html" %}

{% block title %}编辑足迹 - Voyago{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-pencil"></i> 编辑旅行足迹</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="destination_id" class="form-label">目的地 <span class="text-danger">*</span></label>
                            <select class="form-select" id="destination_id" name="destination_id" required>
                                <option value="">请选择目的地</option>
                                {% for destination in destinations %}
                                <option value="{{ destination.id }}" {% if destination.id == footprint.destination_id %}selected{% endif %}>
                                    {{ destination.name }} - {{ destination.country }}
                                    {% if destination.city %}({{ destination.city }}){% endif %}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="visit_date" class="form-label">访问日期 <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" id="visit_date" name="visit_date"
                                   value="{{ footprint.visit_date.strftime('%Y-%m-%d') }}" required>
                        </div>

                        <div class="mb-3">
                            <label for="rating" class="form-label">评分</label>
                            <div class="d-flex align-items-center">
                                <input type="range" class="form-range me-3" id="rating" name="rating" min="1" max="5" step="1"
                                       value="{{ footprint.rating or 5 }}">
                                <span id="rating-value" class="badge bg-primary">
                                    {% if footprint.rating %}{{ '★' * footprint.rating }}{{ '☆' * (5 - footprint.rating) }} ({{ footprint.rating }} 星){% else %}5 星{% endif %}
                                </span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="note" class="form-label">备注</label>
                            <textarea class="form-control" id="note" name="note" rows="4"
                                      placeholder="记录你的旅行回忆...">{{ footprint.note or '' }}</textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('profile') }}" class="btn btn-outline-secondary">取消</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i> 保存修改
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="mt-4">
                <a href="{{ url_for('profile') }}" class="text-decoration-none">
                    <i class="bi bi-arrow-left"></i> 返回个人中心
                </a>
            </div>
        </div>
    </div>
</div>

<script>
// 评分滑块实时显示
document.getElementById('rating').addEventListener('input', function() {
    const value = this.value;
    const stars = '★'.repeat(value) + '☆'.repeat(5 - value);
    document.getElementById('rating-value').textContent = stars + ' (' + value + ' 星)';
});
</script>
{% endblock %}
