{% extends "base.html" %}

{% block title %}发布攻略 - Voyago{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="bi bi-plus-circle"></i> 发布新攻略</h4>
            </div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label for="title" class="form-label">攻略标题</label>
                        <input type="text" class="form-control" id="title" name="title" required>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="destination_id" class="form-label">目的地</label>
                            <select class="form-select" id="destination_id" name="destination_id" required>
                                <option value="">选择目的地</option>
                                {% for destination in destinations %}
                                <option value="{{ destination.id }}">{{ destination.name }} - {{ destination.country }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="category" class="form-label">分类</label>
                            <select class="form-select" id="category" name="category" required>
                                <option value="">选择分类</option>
                                <option value="美食">美食</option>
                                <option value="景点">景点</option>
                                <option value="购物">购物</option>
                                <option value="交通">交通</option>
                                <option value="住宿">住宿</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="cover_image" class="form-label">封面图片</label>
                        <input type="file" class="form-control" id="cover_image" name="cover_image" 
                            accept="image/png, image/jpeg, image/jpg, image/gif, image/webp">
                        <div class="form-text">支持 PNG、JPG、JPEG、GIF、WEBP 格式，最大 16MB</div>
                        <div id="image-preview" class="mt-2"></div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="content" class="form-label">攻略内容</label>
                        <textarea class="form-control" id="content" name="content" rows="15" required
                            placeholder="分享你的旅行经验、注意事项、推荐景点等...&#10;&#10;你可以：&#10;- 介绍景点特色&#10;- 推荐当地美食&#10;- 分享实用贴士&#10;- 提醒注意事项"></textarea>
                        <div class="form-text">支持换行格式化文本</div>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('guides') }}" class="btn btn-secondary">取消</a>
                        <button type="submit" class="btn btn-primary">发布攻略</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const contentTextarea = document.getElementById('content');
contentTextarea.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
        e.preventDefault();
        const start = this.selectionStart;
        const end = this.selectionEnd;
        this.value = this.value.substring(0, start) + '    ' + this.value.substring(end);
        this.selectionStart = this.selectionEnd = start + 4;
    }
});

document.getElementById('cover_image').addEventListener('change', function(e) {
    const file = e.target.files[0];
    const preview = document.getElementById('image-preview');
    
    if (file) {
        if (file.size > 16 * 1024 * 1024) {
            alert('文件大小不能超过 16MB');
            this.value = '';
            preview.innerHTML = '';
            return;
        }
        
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.innerHTML = `
                <div class="border p-3 rounded">
                    <p class="mb-2">预览:</p>
                    <img src="${e.target.result}" class="img-fluid rounded" style="max-height: 300px;">
                    <p class="mt-2 text-muted"><small>文件名: ${file.name}</small></p>
                    <p class="text-muted"><small>文件大小: ${(file.size / 1024 / 1024).toFixed(2)} MB</small></p>
                </div>
            `;
        };
        reader.readAsDataURL(file);
    }
});
</script>
{% endblock %}
