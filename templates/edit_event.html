{% extends "base.html" %}

{% block title %}编辑活动 - {{ event.title }} - Voyago{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{{ url_for('community.communities') }}">社群</a></li>
                    <li class="breadcrumb-item"><a href="{{ url_for('community.community_detail', id=event.community.id) }}">{{ event.community.name }}</a></li>
                    <li class="breadcrumb-item"><a href="{{ url_for('community.event_detail', id=event.id) }}">{{ event.title }}</a></li>
                    <li class="breadcrumb-item active">编辑</li>
                </ol>
            </nav>

            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0"><i class="bi bi-pencil"></i> 编辑活动</h4>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label">活动标题</label>
                            <input type="text" class="form-control" name="title" value="{{ event.title }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">活动描述</label>
                            <textarea class="form-control" name="description" rows="5" required>{{ event.description }}</textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">活动地点</label>
                            <input type="text" class="form-control" name="location" value="{{ event.location }}">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">开始时间</label>
                                <input type="datetime-local" class="form-control" name="start_time" value="{{ event.start_time.strftime('%Y-%m-%dT%H:%M') }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">结束时间</label>
                                <input type="datetime-local" class="form-control" name="end_time" value="{{ event.end_time.strftime('%Y-%m-%dT%H:%M') }}" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">最大参与人数</label>
                            <input type="number" class="form-control" name="max_participants" value="{{ event.max_participants }}" min="5" max="500">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">活动封面</label>
                            <input type="file" class="form-control" name="cover_image" accept="image/*">
                            {% if event.cover_image %}
                            <small class="text-muted">当前封面: {{ event.cover_image }}</small>
                            {% endif %}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">活动状态</label>
                            <select class="form-select" name="status">
                                <option value="upcoming" {% if event.status == 'upcoming' %}selected{% endif %}>即将开始</option>
                                <option value="ongoing" {% if event.status == 'ongoing' %}selected{% endif %}>进行中</option>
                                <option value="completed" {% if event.status == 'completed' %}selected{% endif %}>已结束</option>
                                <option value="cancelled" {% if event.status == 'cancelled' %}selected{% endif %}>已取消</option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('community.event_detail', id=event.id) }}" class="btn btn-secondary">取消</a>
                            <button type="submit" class="btn btn-primary">保存修改</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
