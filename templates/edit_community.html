{% extends "base.html" %}

{% block title %}编辑社群 - {{ community.name }} - Voyago{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0"><i class="bi bi-pencil"></i> 编辑社群</h4>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label">社群名称</label>
                            <input type="text" class="form-control" name="name" value="{{ community.name }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">社群描述</label>
                            <textarea class="form-control" name="description" rows="4" required>{{ community.description }}</textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">关联目的地</label>
                            <select class="form-select" name="destination_id">
                                <option value="">无</option>
                                {% for dest in destinations %}
                                <option value="{{ dest.id }}" {% if community.destination_id == dest.id %}selected{% endif %}>
                                    {{ dest.name }} - {{ dest.country }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">最大成员数</label>
                            <input type="number" class="form-control" name="max_members" value="{{ community.max_members }}" min="10" max="500">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">社群封面</label>
                            <input type="file" class="form-control" name="cover_image" accept="image/*">
                            {% if community.cover_image %}
                            <small class="text-muted">当前封面: {{ community.cover_image }}</small>
                            {% endif %}
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" name="is_public" {% if community.is_public %}checked{% endif %}>
                            <label class="form-check-label">公开社群</label>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('community_detail', id=community.id) }}" class="btn btn-secondary">取消</a>
                            <button type="submit" class="btn btn-primary">保存修改</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
