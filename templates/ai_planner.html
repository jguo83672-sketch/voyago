{% extends "base.html" %}

{% block title %}AI行程规划 - Voyago{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <!-- 左侧：输入表单 -->
        <div class="col-lg-4">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">🤖 AI行程规划</h5>
                </div>
                <div class="card-body">
                    <form id="plannerForm">
                        <div class="mb-3">
                            <label class="form-label">目的地</label>
                            <input type="text" class="form-control" id="destination" list="destinations" required>
                            <datalist id="destinations">
                                {% for dest in destinations %}
                                <option value="{{ dest.name }}" data-id="{{ dest.id }}"></option>
                                {% endfor %}
                            </datalist>
                            <input type="hidden" id="destination_id">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">旅游天数</label>
                            <input type="number" class="form-control" id="days" min="1" max="30" value="3" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">预算（元）</label>
                            <input type="number" class="form-control" id="budget" placeholder="例如：5000" min="0">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">出发日期</label>
                            <input type="date" class="form-control" id="start_date">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">出行人数</label>
                            <input type="number" class="form-control" id="travelers" min="1" max="20" value="1" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">旅行风格</label>
                            <select class="form-select" id="style">
                                <option value="休闲舒适">休闲舒适</option>
                                <option value="深度体验">深度体验</option>
                                <option value="美食之旅">美食之旅</option>
                                <option value="自然探险">自然探险</option>
                                <option value="文化历史">文化历史</option>
                                <option value="购物娱乐">购物娱乐</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">兴趣爱好</label>
                            <div class="row g-2">
                                <div class="col-6">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="美食" id="interest_food">
                                        <label class="form-check-label" for="interest_food">美食</label>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="历史" id="interest_history">
                                        <label class="form-check-label" for="interest_history">历史</label>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="自然" id="interest_nature">
                                        <label class="form-check-label" for="interest_nature">自然</label>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="购物" id="interest_shopping">
                                        <label class="form-check-label" for="interest_shopping">购物</label>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="摄影" id="interest_photography">
                                        <label class="form-check-label" for="interest_photography">摄影</label>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="运动" id="interest_sports">
                                        <label class="form-check-label" for="interest_sports">运动</label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">特殊需求</label>
                            <textarea class="form-control" id="special_needs" rows="3" placeholder="例如：需要无障碍设施、携带儿童等"></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary w-100" id="generateBtn">
                            <span class="spinner-border spinner-border-sm d-none" id="loadingSpinner"></span>
                            生成行程规划
                        </button>
                    </form>
                </div>
            </div>

            <!-- AI推荐 -->
            <div class="card mt-3">
                <div class="card-header">
                    <h6 class="mb-0">💡 AI推荐目的地</h6>
                </div>
                <div class="card-body">
                    <button class="btn btn-outline-primary btn-sm" id="suggestBtn">
                        获取推荐
                    </button>
                    <div id="suggestionArea" class="mt-3"></div>
                </div>
            </div>
        </div>

        <!-- 右侧：规划结果 -->
        <div class="col-lg-8">
            <div id="resultArea" class="d-none">
                <!-- 行程概览 -->
                <div class="card mb-3">
                    <div class="card-header">
                        <h5 class="mb-0">📋 行程概览</h5>
                    </div>
                    <div class="card-body" id="summaryArea"></div>
                </div>

                <!-- 每日行程 -->
                <div id="dailyPlansArea"></div>

                <!-- 打包清单 -->
                <div class="card mb-3 mt-3">
                    <div class="card-header">
                        <h5 class="mb-0">🎒 打包清单</h5>
                    </div>
                    <div class="card-body" id="packingArea"></div>
                </div>

                <!-- 重要提示 -->
                <div class="card mb-3">
                    <div class="card-header">
                        <h5 class="mb-0">⚠️ 重要提示</h5>
                    </div>
                    <div class="card-body" id="tipsArea"></div>
                </div>

                <!-- 保存按钮 -->
                <div class="text-center mb-4">
                    <button class="btn btn-success btn-lg" id="saveBtn">
                        保存此行程
                    </button>
                </div>
            </div>

            <!-- 空状态 -->
            <div id="emptyState" class="text-center py-5">
                <div class="display-1 text-muted mb-3">🗺️</div>
                <h4 class="text-muted">填写左侧表单，让AI为您规划行程</h4>
                <p class="text-muted">AI将结合系统数据和网络搜索，为您生成个性化行程</p>
            </div>
        </div>
    </div>
</div>

<style>
.day-card {
    border-left: 4px solid #0d6efd;
    margin-bottom: 1rem;
}
.activity-item {
    padding: 0.5rem 0;
    border-bottom: 1px solid #dee2e6;
}
.activity-item:last-child {
    border-bottom: none;
}
.time-badge {
    background-color: #0d6efd;
    color: white;
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    font-size: 0.875rem;
}
.meal-badge {
    background-color: #198754;
    color: white;
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    font-size: 0.875rem;
}
</style>

<script>
let currentItinerary = null;

// 目的地选择
document.getElementById('destination').addEventListener('change', function() {
    const value = this.value;
    const datalist = document.getElementById('destinations');
    const options = datalist.querySelectorAll('option');
    for (let option of options) {
        if (option.value === value) {
            document.getElementById('destination_id').value = option.dataset.id;
            break;
        }
    }
});

// 表单提交
document.getElementById('plannerForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const generateBtn = document.getElementById('generateBtn');
    const loadingSpinner = document.getElementById('loadingSpinner');

    // 获取兴趣爱好
    const interests = [];
    document.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
        interests.push(cb.value);
    });

    const formData = {
        destination: document.getElementById('destination').value,
        destination_id: document.getElementById('destination_id').value,
        days: parseInt(document.getElementById('days').value),
        budget: document.getElementById('budget').value,
        start_date: document.getElementById('start_date').value,
        travelers: parseInt(document.getElementById('travelers').value),
        style: document.getElementById('style').value,
        interests: interests,
        special_needs: document.getElementById('special_needs').value
    };

    console.log('[Frontend] Form data:', formData);

    // 显示加载状态
    generateBtn.disabled = true;
    loadingSpinner.classList.remove('d-none');

    try {
        const response = await fetch('/api/ai/plan', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        });

        console.log('[Frontend] Response status:', response.status);

        if (!response.ok) {
            const errorText = await response.text();
            console.error('[Frontend] Response error:', errorText);
            alert(`请求失败 (${response.status}): ${errorText}`);
            return;
        }

        const result = await response.json();
        console.log('[Frontend] API result:', result);

        if (result.success) {
            currentItinerary = {
                ...result.data,
                destination: formData.destination,
                days: formData.days,
                budget: formData.budget
            };
            displayItinerary(result.data);
        } else {
            alert(result.message || result.error || '行程规划失败，请稍后重试');
        }
    } catch (error) {
        alert('网络错误，请稍后重试');
        console.error('[Frontend] Error:', error);
    } finally {
        generateBtn.disabled = false;
        loadingSpinner.classList.add('d-none');
    }
});

// 显示行程
function displayItinerary(data) {
    document.getElementById('emptyState').classList.add('d-none');
    document.getElementById('resultArea').classList.remove('d-none');

    // 显示概览
    const summaryHTML = `
        <p><strong>行程概述：</strong>${data.summary || '暂无概述'}</p>
        <p><strong>总预算：</strong>${data.total_budget || '待估算'}</p>
    `;
    document.getElementById('summaryArea').innerHTML = summaryHTML;

    // 显示每日行程
    let dailyPlansHTML = '';
    if (data.daily_plans) {
        data.daily_plans.forEach((plan, index) => {
            const dayHTML = `
                <div class="card day-card">
                    <div class="card-header">
                        <h5 class="mb-0">${plan.title}</h5>
                    </div>
                    <div class="card-body">
                        <p>${plan.description || ''}</p>

                        ${plan.activities ? `
                        <h6 class="mt-3">活动安排</h6>
                        ${plan.activities.map(act => `
                            <div class="activity-item">
                                <span class="time-badge">${act.time}</span>
                                <strong>${act.activity}</strong>
                                <p class="mb-1">${act.description || ''}</p>
                                ${act.location ? `<small class="text-muted">📍 ${act.location}</small>` : ''}
                                ${act.duration ? `<small class="text-muted ms-2">⏱️ ${act.duration}</small>` : ''}
                                ${act.estimated_cost ? `<small class="text-muted ms-2">💰 ${act.estimated_cost}</small>` : ''}
                                ${act.tips ? `<div class="alert alert-info mt-2 mb-0 py-2">${act.tips}</div>` : ''}
                            </div>
                        `).join('')}
                        ` : ''}

                        ${plan.meals ? `
                        <h6 class="mt-3">用餐建议</h6>
                        <div class="d-flex gap-2 mb-2">
                            ${plan.meals.breakfast ? `<span class="meal-badge">早餐：${plan.meals.breakfast}</span>` : ''}
                        </div>
                        <div class="d-flex gap-2 mb-2">
                            ${plan.meals.lunch ? `<span class="meal-badge">午餐：${plan.meals.lunch}</span>` : ''}
                        </div>
                        <div class="d-flex gap-2">
                            ${plan.meals.dinner ? `<span class="meal-badge">晚餐：${plan.meals.dinner}</span>` : ''}
                        </div>
                        ` : ''}

                        ${plan.accommodation ? `<p class="mt-3 mb-1"><strong>🏨 住宿建议：</strong>${plan.accommodation}</p>` : ''}
                        ${plan.transportation ? `<p class="mb-1"><strong>🚗 交通建议：</strong>${plan.transportation}</p>` : ''}
                        ${plan.estimated_budget ? `<p class="mb-0"><strong>💰 当天预算：</strong>${plan.estimated_budget}</p>` : ''}
                    </div>
                </div>
            `;
            dailyPlansHTML += dayHTML;
        });
    }
    document.getElementById('dailyPlansArea').innerHTML = dailyPlansHTML;

    // 显示打包清单
    let packingHTML = '';
    if (data.packing_list && data.packing_list.length > 0) {
        packingHTML = `<ul>${data.packing_list.map(item => `<li>${item}</li>`).join('')}</ul>`;
    } else {
        packingHTML = '<p class="text-muted">暂无打包清单</p>';
    }
    document.getElementById('packingArea').innerHTML = packingHTML;

    // 显示重要提示
    let tipsHTML = '';
    if (data.important_tips && data.important_tips.length > 0) {
        tipsHTML = `<ul>${data.important_tips.map(tip => `<li>${tip}</li>`).join('')}</ul>`;
    } else {
        tipsHTML = '<p class="text-muted">暂无重要提示</p>';
    }
    document.getElementById('tipsArea').innerHTML = tipsHTML;
}

// 保存行程
document.getElementById('saveBtn').addEventListener('click', async function() {
    if (!currentItinerary) {
        alert('请先生成行程');
        return;
    }

    if (!confirm('确定要保存此行程吗？')) {
        return;
    }

    try {
        const response = await fetch('/api/ai/save-itinerary', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ itinerary: currentItinerary })
        });

        const result = await response.json();

        if (result.success) {
            alert('行程保存成功！');
            window.location.href = `/itinerary/${result.itinerary_id}`;
        } else {
            alert(result.message || '保存失败');
        }
    } catch (error) {
        alert('网络错误，请稍后重试');
        console.error(error);
    }
});

// AI推荐
document.getElementById('suggestBtn').addEventListener('click', async function() {
    const interests = [];
    document.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
        interests.push(cb.value);
    });

    if (interests.length === 0) {
        alert('请先选择至少一个兴趣爱好');
        return;
    }

    const days = document.getElementById('days').value;
    const budget = document.getElementById('budget').value;

    this.disabled = true;
    this.textContent = '正在推荐...';

    try {
        const response = await fetch('/api/ai/suggest', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                interests: interests,
                days: parseInt(days),
                budget: budget
            })
        });

        const result = await response.json();

        if (result.success && result.data && result.data.recommendations) {
            let html = '<div class="list-group">';
            result.data.recommendations.forEach(rec => {
                html += `
                    <a href="#" class="list-group-item list-group-item-action suggestion-item">
                        <h6 class="mb-1">${rec.name}, ${rec.country}</h6>
                        <p class="mb-1 small text-muted">${rec.city}</p>
                        <p class="mb-1 small">${rec.reason}</p>
                        <small class="text-success">💰 ${rec.estimated_budget}</small>
                        <small class="text-primary ms-2">📅 ${rec.best_season}</small>
                    </a>
                `;
            });
            html += '</div>';
            document.getElementById('suggestionArea').innerHTML = html;

            // 点击推荐项
            document.querySelectorAll('.suggestion-item').forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    const name = this.querySelector('h6').textContent.split(',')[0];
                    document.getElementById('destination').value = name;
                });
            });
        } else {
            alert(result.error || '获取推荐失败');
        }
    } catch (error) {
        alert('网络错误，请稍后重试');
        console.error(error);
    } finally {
        this.disabled = false;
        this.textContent = '获取推荐';
    }
});
</script>
{% endblock %}
