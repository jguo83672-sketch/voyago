{% extends "base.html" %}

{% block title %}创建活动 - {{ community.name }} - Voyago{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{{ url_for('community.communities') }}">社群</a></li>
                    <li class="breadcrumb-item"><a href="{{ url_for('community.community_detail', id=community.id) }}">{{ community.name }}</a></li>
                    <li class="breadcrumb-item active">创建活动</li>
                </ol>
            </nav>

            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0"><i class="bi bi-calendar-plus"></i> 创建活动</h4>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label">活动标题 *</label>
                            <input type="text" class="form-control" name="title" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">活动描述 *</label>
                            <textarea class="form-control" name="description" rows="5" required></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">活动地点</label>
                            <input type="text" class="form-control" name="location" placeholder="线上活动或具体地址">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">开始时间 *</label>
                                <input type="datetime-local" class="form-control" name="start_time" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">结束时间 *</label>
                                <input type="datetime-local" class="form-control" name="end_time" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">最大参与人数</label>
                            <input type="number" class="form-control" name="max_participants" value="20" min="5" max="500">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">活动封面</label>
                            <input type="file" class="form-control" name="cover_image" accept="image/*">
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('community.community_detail', id=community.id) }}" class="btn btn-secondary">取消</a>
                            <button type="submit" class="btn btn-primary">创建活动</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
